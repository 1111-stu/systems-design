name: Deploy Demo

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}/drizzle-migration-cicd-demo:${{ github.sha }}
          docker build -t "$IMAGE" ./drizzle-migration-cicd-demo
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Run migration and deploy app
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            IMAGE=${{ env.IMAGE }}
            docker pull "$IMAGE"

            docker run --rm \
              --env-file /opt/drizzle-demo/.env \
              "$IMAGE" \
              node dist/migrate.js

            docker rm -f drizzle-demo || true

            docker run -d \
              --name drizzle-demo \
              --restart always \
              --env-file /opt/drizzle-demo/.env \
              -p 3000:3000 \
              "$IMAGE"
